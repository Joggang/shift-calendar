<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="교대달력" />
  <meta name="theme-color" content="#4a90e2" />
  <title>교대 달력</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet" />

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #f4f6fb;
      color: #333;
      font-family: 'Noto Sans KR', sans-serif;
      min-height: 100vh;
      padding: 16px;
    }

    /* ── 헤더 ── */
    .header {
      text-align: center;
      margin-bottom: 16px;
      padding: 20px 16px 16px;
      background: white;
      border-radius: 16px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.07);
    }
    .header h1 { font-size: 1.5rem; font-weight: 700; color: #2c3e50; }
    .header p  { color: #888; font-size: 0.82rem; margin-top: 4px; line-height: 1.6; }

    /* ── 조 선택 탭 ── */
    .team-tabs {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .team-tab {
      padding: 8px 22px;
      border-radius: 24px;
      border: 2px solid #e0e0e0;
      background: white;
      font-size: 0.85rem;
      font-weight: 600;
      color: #999;
      cursor: pointer;
      font-family: 'Noto Sans KR', sans-serif;
      transition: all 0.18s;
    }
    .team-tab:hover { border-color: #4a90e2; color: #4a90e2; }
    .team-tab.active {
      background: #4a90e2;
      border-color: #4a90e2;
      color: white;
      box-shadow: 0 3px 10px rgba(74,144,226,0.35);
    }

    /* ── 범례 ── */
    .legend {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .legend-item {
      display: flex; align-items: center; gap: 6px;
      font-size: 0.8rem; color: #555;
      background: white; padding: 6px 12px;
      border-radius: 20px; box-shadow: 0 1px 6px rgba(0,0,0,0.07);
    }
    .legend-dot {
      width: 24px; height: 24px; border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.7rem; font-weight: 700; color: white;
    }
    .dot-day   { background: #4a90e2; }
    .dot-night { background: #5c6bc0; }
    .dot-off   { background: #b0bec5; }

    /* ── 월 네비게이션 ── */
    .month-nav {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      margin-bottom: 16px;
    }
    .nav-btn {
      width: 40px; height: 40px;
      border-radius: 50%;
      border: 2px solid #e0e0e0;
      background: white;
      font-size: 1.1rem;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Noto Sans KR', sans-serif;
      transition: all 0.15s;
      box-shadow: 0 1px 6px rgba(0,0,0,0.07);
      color: #555;
    }
    .nav-btn:hover:not(:disabled) {
      background: #4a90e2; border-color: #4a90e2; color: white;
      box-shadow: 0 3px 10px rgba(74,144,226,0.35);
    }
    .nav-btn:disabled { opacity: 0.3; cursor: default; }
    .nav-label {
      font-size: 1.1rem; font-weight: 700; color: #2c3e50;
      min-width: 140px; text-align: center;
    }

    /* ── 월 카드 ── */
    .month-card {
      background: white;
      border-radius: 16px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.07);
      overflow: hidden;
    }
    .month-header {
      padding: 12px 16px;
      background: #f8f9fc;
      border-bottom: 1px solid #eef0f5;
      display: flex; align-items: center;
      justify-content: space-between;
      flex-wrap: wrap; gap: 8px;
    }
    .month-title { font-size: 1rem; font-weight: 700; color: #2c3e50; }
    .month-stats { display: flex; gap: 6px; flex-wrap: wrap; }
    .stat { font-size: 0.72rem; padding: 3px 9px; border-radius: 20px; font-weight: 600; }
    .stat-day   { background: #e3f0fd; color: #4a90e2; }
    .stat-night { background: #ede7f6; color: #5c6bc0; }
    .stat-off   { background: #eceff1; color: #78909c; }

    /* ── 달력 그리드 ── */
    .calendar-grid { padding: 12px; }
    .weekdays {
      display: grid; grid-template-columns: repeat(7, 1fr);
      gap: 3px; margin-bottom: 3px;
    }
    .weekday {
      text-align: center; font-size: 0.7rem;
      font-weight: 600; padding: 4px; color: #aaa;
    }
    .weekday:first-child { color: #e57373; }
    .weekday:last-child  { color: #64b5f6; }
    .days-grid {
      display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px;
    }

    /* ── 날짜 칸 ── */
    .day-cell {
      border-radius: 10px;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      min-height: 52px;
      position: relative;
      transition: transform 0.12s;
      cursor: default;
    }
    .day-cell:hover { transform: scale(1.06); }
    .day-cell.empty { background: transparent; border: none; }

    .day-cell.day-shift   { background: #e8f2fd; border: 1.5px solid #b3d4f5; }
    .day-cell.night-shift { background: #ede7f6; border: 1.5px solid #c5b3e6; }
    .day-cell.off-day     { background: #f5f5f5; border: 1.5px solid #e0e0e0; }
    .day-cell.today       { box-shadow: 0 0 0 2.5px #ff7043 !important; }

    .day-num { font-size: 0.95rem; font-weight: 700; line-height: 1; }
    .day-cell.day-shift   .day-num { color: #1a6abf; }
    .day-cell.night-shift .day-num { color: #4527a0; }
    .day-cell.off-day     .day-num { color: #90a4ae; }

    .shift-label { font-size: 0.58rem; font-weight: 600; margin-top: 3px; }
    .day-cell.day-shift   .shift-label { color: #4a90e2; }
    .day-cell.night-shift .shift-label { color: #7c57c8; }
    .day-cell.off-day     .shift-label { color: #b0bec5; }

    .sun .day-num { color: #e57373 !important; }
    .sat .day-num { color: #64b5f6 !important; }

    .today-badge {
      position: absolute; top: 4px; right: 4px;
      width: 5px; height: 5px;
      background: #ff7043; border-radius: 50%;
    }

    /* ── 반응형 ── */
    @media (max-width: 480px) {
      body           { padding: 10px; }
      .header h1     { font-size: 1.2rem; }
      .header p      { font-size: 0.75rem; }
      .month-title   { font-size: 0.9rem; }
      .stat          { font-size: 0.65rem; padding: 2px 7px; }
      .calendar-grid { padding: 8px; }
      .days-grid     { gap: 2px; }
      .weekdays      { gap: 2px; }
      .day-cell      { min-height: 44px; border-radius: 8px; }
      .day-num       { font-size: 0.82rem; }
      .shift-label   { font-size: 0.52rem; }
      .weekday       { font-size: 0.62rem; }
      .nav-label     { font-size: 0.95rem; min-width: 120px; }
    }
    @media (max-width: 360px) {
      .day-cell    { min-height: 38px; }
      .day-num     { font-size: 0.75rem; }
      .shift-label { display: none; }
    }
  </style>
</head>
<body>

  <div class="header">
    <h1>🗓️ 교대 달력</h1>
    <p id="team-desc">A조 · 3조 2교대</p>
    <p>주간 4일 → 휴무 2일 → 야간 4일 → 휴무 2일</p>
  </div>

  <!-- 조 선택 탭 -->
  <div class="team-tabs" id="team-tabs"></div>

  <!-- 범례 -->
  <div class="legend">
    <div class="legend-item"><div class="legend-dot dot-day">주</div> 주간 근무</div>
    <div class="legend-item"><div class="legend-dot dot-night">야</div> 야간 근무</div>
    <div class="legend-item"><div class="legend-dot dot-off">휴</div> 휴무</div>
  </div>

  <!-- 월 네비게이션 -->
  <div class="month-nav">
    <button class="nav-btn" id="btn-prev">&#8592;</button>
    <div class="nav-label" id="nav-label"></div>
    <button class="nav-btn" id="btn-next">&#8594;</button>
  </div>

  <!-- 달력 표시 영역 -->
  <div id="calendar-area"></div>

  <script>
    /* =====================================================
       ★ 조(팀) 설정 - B조, C조 추가할 때 여기에 항목 추가
       
       각 팀 설정:
         name    : 탭에 표시될 이름
         desc    : 헤더 설명 텍스트
         pattern : 근무 패턴 배열 ('주'=주간, '야'=야간, '휴'=휴무)
         start   : 패턴 기준 시작일 new Date(연도, 월-1, 일)
    ===================================================== */
    var TEAMS = [
      {
        name: 'A조',
        desc: 'A조 · 3조 2교대',
        pattern: ['주','주','주','주','휴','휴','야','야','야','야','휴','휴'],
        start: new Date(2026, 2, 10)   // 2026-03-10
      },
      /* ── B조 추가 예시 (주석 해제 후 start 날짜 맞게 수정) ──
      {
        name: 'B조',
        desc: 'B조 · 3조 2교대',
        pattern: ['주','주','주','주','휴','휴','야','야','야','야','휴','휴'],
        start: new Date(2026, 2, 6)    // 2026-03-06  (A조보다 4일 앞)
      },
      */
      /* ── C조 추가 예시 ──
      {
        name: 'C조',
        desc: 'C조 · 3조 2교대',
        pattern: ['주','주','주','주','휴','휴','야','야','야','야','휴','휴'],
        start: new Date(2026, 2, 2)    // 2026-03-02  (A조보다 8일 앞)
      },
      */
    ];

    /* =====================================================
       표시 범위: 2026년 3월 ~ 2027년 12월
    ===================================================== */
    var RANGE_START = { year: 2026, month: 2 };   // month는 0-indexed (2=3월)
    var RANGE_END   = { year: 2027, month: 11 };  // 11=12월

    /* =====================================================
       상태 변수
    ===================================================== */
    var currentTeamIdx = 0;
    var currentYear    = RANGE_START.year;
    var currentMonth   = RANGE_START.month;

    /* =====================================================
       유틸 함수들
    ===================================================== */
    function getShift(team, date) {
      var diff = Math.floor((date - team.start) / (1000 * 60 * 60 * 24));
      var len  = team.pattern.length;
      return team.pattern[((diff % len) + len) % len];
    }

    function isAtStart() {
      return currentYear === RANGE_START.year && currentMonth === RANGE_START.month;
    }
    function isAtEnd() {
      return currentYear === RANGE_END.year && currentMonth === RANGE_END.month;
    }

    function monthName(m) {
      return (m + 1) + '월';
    }

    /* =====================================================
       렌더링
    ===================================================== */
    function renderTeamTabs() {
      var container = document.getElementById('team-tabs');
      container.innerHTML = '';
      TEAMS.forEach(function(team, idx) {
        var btn = document.createElement('button');
        btn.className = 'team-tab' + (idx === currentTeamIdx ? ' active' : '');
        btn.textContent = team.name;
        btn.onclick = function() {
          currentTeamIdx = idx;
          renderAll();
        };
        container.appendChild(btn);
      });
    }

    function renderNav() {
      document.getElementById('nav-label').textContent =
        currentYear + '년 ' + monthName(currentMonth);
      document.getElementById('btn-prev').disabled = isAtStart();
      document.getElementById('btn-next').disabled = isAtEnd();
    }

    function renderCalendar() {
      var area  = document.getElementById('calendar-area');
      var team  = TEAMS[currentTeamIdx];
      var today = new Date();
      today.setHours(0, 0, 0, 0);

      var weekdays  = ['일','월','화','수','목','금','토'];
      var year      = currentYear;
      var m         = currentMonth;
      var firstDay  = new Date(year, m, 1);
      var lastDay   = new Date(year, m + 1, 0);
      var startDow  = firstDay.getDay();

      // 일수 집계
      var dayCount = 0, nightCount = 0, offCount = 0;
      for (var d = 1; d <= lastDay.getDate(); d++) {
        var s = getShift(team, new Date(year, m, d));
        if      (s === '주') dayCount++;
        else if (s === '야') nightCount++;
        else                 offCount++;
      }

      // 카드 HTML 조립
      var html = '<div class="month-card">';

      // 헤더
      html += '<div class="month-header">';
      html += '<div class="month-title">' + year + '년 ' + monthName(m) + '</div>';
      html += '<div class="month-stats">';
      html += '<span class="stat stat-day">주간 '  + dayCount   + '일</span>';
      html += '<span class="stat stat-night">야간 ' + nightCount + '일</span>';
      html += '<span class="stat stat-off">휴무 '  + offCount   + '일</span>';
      html += '</div></div>';

      // 달력 그리드
      html += '<div class="calendar-grid">';
      html += '<div class="weekdays">';
      weekdays.forEach(function(wd) { html += '<div class="weekday">' + wd + '</div>'; });
      html += '</div>';

      html += '<div class="days-grid">';

      // 앞 빈 칸
      for (var i = 0; i < startDow; i++) {
        html += '<div class="day-cell empty"></div>';
      }

      // 날짜 칸
      for (var d = 1; d <= lastDay.getDate(); d++) {
        var date    = new Date(year, m, d);
        var shift   = getShift(team, date);
        var dow     = date.getDay();
        var isToday = date.getTime() === today.getTime();

        var cls = 'day-cell';
        if      (shift === '주') cls += ' day-shift';
        else if (shift === '야') cls += ' night-shift';
        else                     cls += ' off-day';
        if (dow === 0) cls += ' sun';
        if (dow === 6) cls += ' sat';
        if (isToday)   cls += ' today';

        var label    = shift === '주' ? '주간' : shift === '야' ? '야간' : '휴무';
        var badge    = isToday ? '<div class="today-badge"></div>' : '';

        html += '<div class="' + cls + '">';
        html += '<span class="day-num">' + d + '</span>';
        html += '<span class="shift-label">' + label + '</span>';
        html += badge;
        html += '</div>';
      }

      html += '</div></div></div>';

      area.innerHTML = html;
    }

    function renderAll() {
      renderTeamTabs();
      renderNav();
      renderCalendar();
      document.getElementById('team-desc').textContent = TEAMS[currentTeamIdx].desc;
    }

    /* =====================================================
       네비게이션 버튼
    ===================================================== */
    document.getElementById('btn-prev').onclick = function() {
      if (isAtStart()) return;
      currentMonth--;
      if (currentMonth < 0) { currentMonth = 11; currentYear--; }
      renderAll();
    };
    document.getElementById('btn-next').onclick = function() {
      if (isAtEnd()) return;
      currentMonth++;
      if (currentMonth > 11) { currentMonth = 0; currentYear++; }
      renderAll();
    };

    /* =====================================================
       초기 렌더링 - 오늘 날짜가 범위 안이면 오늘 달로 이동
    ===================================================== */
    (function() {
      var now = new Date();
      var ny  = now.getFullYear();
      var nm  = now.getMonth();
      var inRange =
        (ny > RANGE_START.year || (ny === RANGE_START.year && nm >= RANGE_START.month)) &&
        (ny < RANGE_END.year   || (ny === RANGE_END.year   && nm <= RANGE_END.month));
      if (inRange) {
        currentYear  = ny;
        currentMonth = nm;
      }
      renderAll();
    })();
  </script>

</body>
</html>
