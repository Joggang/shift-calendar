<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="교대달력" />
  <meta name="theme-color" content="#2563eb" />
  <title>교대 달력</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet" />

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #e8eaf0;
      font-family: 'Noto Sans KR', sans-serif;
      min-height: 100vh;
    }

    /* ── 상단 헤더 ── */
    .top-bar {
      background: #2563eb;
      padding: 16px 16px 0;
    }
    .top-bar-title {
      font-size: 1.8rem;
      font-weight: 900;
      color: white;
      letter-spacing: -1px;
    }
    .top-bar-sub {
      font-size: 0.8rem;
      color: rgba(255,255,255,0.7);
      margin-top: 2px;
      padding-bottom: 10px;
    }

    /* ── 조 탭 ── */
    .team-tabs {
      display: flex;
      background: #2563eb;
      padding: 0 16px;
      gap: 0;
    }
    .team-tab {
      padding: 10px 22px;
      border: none;
      background: transparent;
      font-size: 0.95rem;
      font-weight: 700;
      color: rgba(255,255,255,0.55);
      cursor: pointer;
      font-family: 'Noto Sans KR', sans-serif;
      border-bottom: 3px solid transparent;
      transition: all 0.15s;
    }
    .team-tab.active {
      color: white;
      border-bottom: 3px solid white;
    }

    /* ── 월 네비게이션 ── */
    .month-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: white;
      padding: 12px 20px;
      border-bottom: 1px solid #e5e7eb;
    }
    .nav-btn {
      width: 38px; height: 38px;
      border-radius: 50%;
      border: 1.5px solid #e5e7eb;
      background: white;
      font-size: 1.1rem;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: #6b7280;
      transition: all 0.12s;
    }
    .nav-btn:hover:not(:disabled) { background: #eff6ff; border-color: #2563eb; color: #2563eb; }
    .nav-btn:disabled { opacity: 0.2; cursor: default; }
    .nav-label {
      font-size: 1.4rem;
      font-weight: 900;
      color: #2563eb;
      letter-spacing: -0.5px;
    }

    /* ── 범례 ── */
    .legend {
      display: flex;
      justify-content: center;
      gap: 16px;
      padding: 10px 16px;
      background: white;
      border-bottom: 1px solid #f0f0f0;
    }
    .legend-item {
      display: flex; align-items: center; gap: 6px;
      font-size: 0.82rem; color: #374151; font-weight: 600;
    }
    .legend-badge {
      font-size: 0.75rem; font-weight: 900;
      padding: 3px 8px; border-radius: 6px; color: white;
    }
    .lb-day   { background: #d97706; }
    .lb-night { background: #111827; }
    .lb-off   { background: #dc2626; }

    /* ── 달력 카드 ── */
    .calendar-wrap {
      background: white;
      margin: 12px;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }

    /* 통계 */
    .month-stats-bar {
      display: flex;
      gap: 10px;
      padding: 12px 16px;
      background: #f9fafb;
      border-bottom: 1px solid #f0f0f0;
    }
    .stat {
      font-size: 0.78rem; padding: 5px 14px;
      border-radius: 20px; font-weight: 700;
    }
    .stat-day   { background: #fef3c7; color: #d97706; }
    .stat-night { background: #f3f4f6; color: #111827; border: 1.5px solid #d1d5db; }
    .stat-off   { background: #fee2e2; color: #dc2626; }

    /* 요일 헤더 */
    .weekdays {
      display: grid; grid-template-columns: repeat(7, 1fr);
      border-bottom: 1.5px solid #e5e7eb;
    }
    .weekday {
      text-align: center;
      font-size: 0.78rem; font-weight: 700;
      padding: 10px 2px; color: #9ca3af;
    }
    .weekday:first-child { color: #ef4444; }
    .weekday:last-child  { color: #3b82f6; }

    /* 날짜 그리드 */
    .days-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
    }

    /* 날짜 칸 */
    .day-cell {
      min-height: 76px;
      padding: 6px 4px 8px;
      border-right: 1px solid #f3f4f6;
      border-bottom: 1px solid #f3f4f6;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      position: relative;
    }
    .day-cell:nth-child(7n) { border-right: none; }

    /* 배지 */
    .shift-badge {
      font-size: 0.72rem;
      font-weight: 900;
      padding: 3px 8px;
      border-radius: 6px;
      color: white;
      line-height: 1.3;
      margin-top: 2px;
    }
    .b-day   { background: #d97706; }
    .b-night { background: #111827; }
    .b-off   { background: #dc2626; }

    /* 날짜 숫자 */
    .day-num {
      font-size: 1.25rem;
      font-weight: 900;
      color: #1f2937;
      line-height: 1;
    }

    /* 오늘 */
    .day-cell.today .day-num {
      background: #2563eb;
      color: white;
      width: 36px; height: 36px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.15rem;
    }

    /* 요일별 색상 */
    .sun .day-num { color: #ef4444; }
    .sat .day-num { color: #3b82f6; }
    .today.sun .day-num,
    .today.sat .day-num { color: white; }

    /* 다음달/이전달 날짜 (흐리게) */
    .day-cell.other-month {
      opacity: 0.28;
    }

    /* 반응형 */
    @media (max-width: 480px) {
      .day-cell    { min-height: 68px; }
      .day-num     { font-size: 1.1rem; }
      .shift-badge { font-size: 0.65rem; padding: 2px 6px; }
      .nav-label   { font-size: 1.2rem; }
    }
    @media (max-width: 360px) {
      .day-cell    { min-height: 58px; }
      .day-num     { font-size: 0.95rem; }
      .shift-badge { font-size: 0.6rem; padding: 2px 5px; }
    }
  </style>
</head>
<body>

  <div class="top-bar">
    <div class="top-bar-title">교대 달력</div>
    <div class="top-bar-sub" id="team-desc">A조 · 3조 2교대</div>
  </div>
  <div class="team-tabs" id="team-tabs"></div>

  <div class="month-nav">
    <button class="nav-btn" id="btn-prev">&#8592;</button>
    <div class="nav-label" id="nav-label"></div>
    <button class="nav-btn" id="btn-next">&#8594;</button>
  </div>

  <div class="legend">
    <div class="legend-item"><span class="legend-badge lb-day">주</span> 주간</div>
    <div class="legend-item"><span class="legend-badge lb-night">야</span> 야간</div>
    <div class="legend-item"><span class="legend-badge lb-off">휴</span> 휴무</div>
  </div>

  <div id="calendar-area"></div>

  <script>
    var TEAMS = [
      {
        name: 'A조',
        desc: 'A조 · 3조 2교대',
        pattern: ['주','주','주','주','휴','휴','야','야','야','야','휴','휴'],
        start: new Date(2026, 2, 10)
      },
      {
        name: 'B조',
        desc: 'B조 · 3조 2교대',
        pattern: ['주','주','주','주','휴','휴','야','야','야','야','휴','휴'],
        start: new Date(2026, 2, 2)
      },
      {
        name: 'C조',
        desc: 'C조 · 3조 2교대',
        pattern: ['주','주','주','주','휴','휴','야','야','야','야','휴','휴'],
        start: new Date(2026, 1, 22)
      },
    ];

    var RANGE_START = { year: 2026, month: 2 };
    var RANGE_END   = { year: 2027, month: 11 };
    var currentTeamIdx = 0;
    var currentYear    = RANGE_START.year;
    var currentMonth   = RANGE_START.month;

    function getShift(team, date) {
      var diff = Math.floor((date - team.start) / (1000 * 60 * 60 * 24));
      var len  = team.pattern.length;
      return team.pattern[((diff % len) + len) % len];
    }
    function isAtStart() { return currentYear === RANGE_START.year && currentMonth === RANGE_START.month; }
    function isAtEnd()   { return currentYear === RANGE_END.year   && currentMonth === RANGE_END.month; }
    function monthName(m) { return (m + 1) + '월'; }

    function renderTeamTabs() {
      var container = document.getElementById('team-tabs');
      container.innerHTML = '';
      TEAMS.forEach(function(team, idx) {
        var btn = document.createElement('button');
        btn.className = 'team-tab' + (idx === currentTeamIdx ? ' active' : '');
        btn.textContent = team.name;
        btn.onclick = function() { currentTeamIdx = idx; renderAll(); };
        container.appendChild(btn);
      });
    }

    function renderNav() {
      document.getElementById('nav-label').textContent = currentYear + '년 ' + monthName(currentMonth);
      document.getElementById('btn-prev').disabled = isAtStart();
      document.getElementById('btn-next').disabled = isAtEnd();
    }

    function renderCalendar() {
      var area  = document.getElementById('calendar-area');
      var team  = TEAMS[currentTeamIdx];
      var today = new Date(); today.setHours(0,0,0,0);
      var weekdays = ['일','월','화','수','목','금','토'];
      var year = currentYear, m = currentMonth;
      var firstDay = new Date(year, m, 1);
      var lastDay  = new Date(year, m + 1, 0);
      var startDow = firstDay.getDay();
      // 마지막 칸 채우기용
      var endDow   = lastDay.getDay();

      var dayCount = 0, nightCount = 0, offCount = 0;
      for (var d = 1; d <= lastDay.getDate(); d++) {
        var s = getShift(team, new Date(year, m, d));
        if (s === '주') dayCount++; else if (s === '야') nightCount++; else offCount++;
      }

      var html = '<div class="calendar-wrap">';

      // 통계
      html += '<div class="month-stats-bar">';
      html += '<span class="stat stat-day">주간 ' + dayCount + '일</span>';
      html += '<span class="stat stat-night">야간 ' + nightCount + '일</span>';
      html += '<span class="stat stat-off">휴무 ' + offCount + '일</span>';
      html += '</div>';

      // 요일 헤더
      html += '<div class="weekdays">';
      weekdays.forEach(function(wd) { html += '<div class="weekday">' + wd + '</div>'; });
      html += '</div>';

      html += '<div class="days-grid">';

      // 이전달 날짜 (흐리게)
      var prevLastDay = new Date(year, m, 0).getDate();
      for (var i = startDow - 1; i >= 0; i--) {
        var pd   = prevLastDay - i;
        var pDate = new Date(year, m - 1, pd);
        var ps   = getShift(team, pDate);
        var pdow = pDate.getDay();
        var pcls = 'day-cell other-month' + (pdow===0?' sun':'') + (pdow===6?' sat':'');
        var pbadge = ps==='주' ? '<span class="shift-badge b-day">주</span>' : ps==='야' ? '<span class="shift-badge b-night">야</span>' : '<span class="shift-badge b-off">휴</span>';
        html += '<div class="' + pcls + '">' + pbadge + '<span class="day-num">' + pd + '</span></div>';
      }

      // 이번달 날짜
      for (var d = 1; d <= lastDay.getDate(); d++) {
        var date    = new Date(year, m, d);
        var shift   = getShift(team, date);
        var dow     = date.getDay();
        var isToday = date.getTime() === today.getTime();

        var cls = 'day-cell';
        if (dow === 0) cls += ' sun';
        if (dow === 6) cls += ' sat';
        if (isToday)   cls += ' today';

        var badgeCls = shift==='주' ? 'b-day' : shift==='야' ? 'b-night' : 'b-off';
        var badgeTxt = shift==='주' ? '주' : shift==='야' ? '야' : '휴';

        html += '<div class="' + cls + '">';
        html += '<span class="shift-badge ' + badgeCls + '">' + badgeTxt + '</span>';
        html += '<span class="day-num">' + d + '</span>';
        html += '</div>';
      }

      // 다음달 날짜 (흐리게) - 마지막 주 채우기
      if (endDow < 6) {
        for (var nd = 1; nd <= 6 - endDow; nd++) {
          var nDate = new Date(year, m + 1, nd);
          var ns    = getShift(team, nDate);
          var ndow  = nDate.getDay();
          var ncls  = 'day-cell other-month' + (ndow===0?' sun':'') + (ndow===6?' sat':'');
          var nbadge = ns==='주' ? '<span class="shift-badge b-day">주</span>' : ns==='야' ? '<span class="shift-badge b-night">야</span>' : '<span class="shift-badge b-off">휴</span>';
          html += '<div class="' + ncls + '">' + nbadge + '<span class="day-num">' + nd + '</span></div>';
        }
      }

      html += '</div></div>';
      area.innerHTML = html;
    }

    function renderAll() {
      renderTeamTabs();
      renderNav();
      renderCalendar();
      document.getElementById('team-desc').textContent = TEAMS[currentTeamIdx].desc;
    }

    document.getElementById('btn-prev').onclick = function() {
      if (isAtStart()) return;
      currentMonth--;
      if (currentMonth < 0) { currentMonth = 11; currentYear--; }
      renderAll();
    };
    document.getElementById('btn-next').onclick = function() {
      if (isAtEnd()) return;
      currentMonth++;
      if (currentMonth > 11) { currentMonth = 0; currentYear++; }
      renderAll();
    };

    (function() {
      var now = new Date(), ny = now.getFullYear(), nm = now.getMonth();
      var inRange =
        (ny > RANGE_START.year || (ny === RANGE_START.year && nm >= RANGE_START.month)) &&
        (ny < RANGE_END.year   || (ny === RANGE_END.year   && nm <= RANGE_END.month));
      if (inRange) { currentYear = ny; currentMonth = nm; }
      renderAll();
    })();
  </script>

</body>
</html>
