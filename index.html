<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="교대달력" />
  <meta name="theme-color" content="#2563eb" />
  <title>교대 달력</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet" />

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #f0f2f5;
      color: #222;
      font-family: 'Noto Sans KR', sans-serif;
      min-height: 100vh;
    }

    /* ── 상단 파란 헤더 바 ── */
    .top-bar {
      background: #2563eb;
      padding: 14px 16px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .top-bar-title {
      font-size: 1.5rem;
      font-weight: 900;
      color: white;
      letter-spacing: -1px;
    }
    .top-bar-sub {
      font-size: 0.75rem;
      color: rgba(255,255,255,0.75);
      margin-top: 1px;
    }

    /* ── 조 선택 탭 ── */
    .team-tabs {
      display: flex;
      background: #1d4ed8;
      padding: 0 12px;
      gap: 4px;
    }
    .team-tab {
      padding: 8px 18px;
      border: none;
      background: transparent;
      font-size: 0.82rem;
      font-weight: 700;
      color: rgba(255,255,255,0.6);
      cursor: pointer;
      font-family: 'Noto Sans KR', sans-serif;
      border-bottom: 3px solid transparent;
      transition: all 0.15s;
    }
    .team-tab:hover { color: white; }
    .team-tab.active {
      color: white;
      border-bottom: 3px solid white;
    }

    /* ── 월 네비게이션 ── */
    .month-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: white;
      padding: 10px 16px;
      border-bottom: 1px solid #e5e7eb;
    }
    .nav-btn {
      width: 34px; height: 34px;
      border-radius: 50%;
      border: 1.5px solid #e5e7eb;
      background: white;
      font-size: 1rem;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: #6b7280;
      transition: all 0.12s;
    }
    .nav-btn:hover:not(:disabled) { background: #eff6ff; border-color: #2563eb; color: #2563eb; }
    .nav-btn:disabled { opacity: 0.25; cursor: default; }
    .nav-label {
      font-size: 1.25rem;
      font-weight: 900;
      color: #2563eb;
      letter-spacing: -0.5px;
    }

    /* ── 범례 ── */
    .legend {
      display: flex;
      justify-content: center;
      gap: 12px;
      padding: 8px 16px;
      background: white;
      border-bottom: 1px solid #e5e7eb;
    }
    .legend-item {
      display: flex; align-items: center; gap: 5px;
      font-size: 0.75rem; color: #6b7280;
    }
    .legend-badge {
      font-size: 0.65rem; font-weight: 700;
      padding: 2px 6px; border-radius: 3px; color: white;
    }
    .badge-day   { background: #d97706; }
    .badge-night { background: #111827; }
    .badge-off   { background: #dc2626; }

    /* ── 달력 영역 ── */
    .calendar-wrap {
      background: white;
      margin: 10px;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 1px 6px rgba(0,0,0,0.08);
    }

    /* 월 통계 */
    .month-stats-bar {
      display: flex;
      gap: 8px;
      padding: 10px 14px;
      background: #f9fafb;
      border-bottom: 1px solid #f0f0f0;
      flex-wrap: wrap;
    }
    .stat {
      font-size: 0.7rem; padding: 3px 9px;
      border-radius: 20px; font-weight: 700;
    }
    .stat-day   { background: #fef3c7; color: #d97706; }
    .stat-night { background: #f3f4f6; color: #374151; border: 1px solid #e5e7eb; }
    .stat-off   { background: #fee2e2; color: #dc2626; }

    /* 요일 헤더 */
    .weekdays {
      display: grid; grid-template-columns: repeat(7, 1fr);
      border-bottom: 1px solid #f0f0f0;
    }
    .weekday {
      text-align: center;
      font-size: 0.72rem; font-weight: 700;
      padding: 8px 2px; color: #9ca3af;
    }
    .weekday:first-child { color: #ef4444; }
    .weekday:last-child  { color: #3b82f6; }

    /* 날짜 그리드 */
    .days-grid {
      display: grid; grid-template-columns: repeat(7, 1fr);
    }

    /* 날짜 칸 */
    .day-cell {
      min-height: 64px;
      padding: 4px 4px 6px;
      border-right: 1px solid #f3f4f6;
      border-bottom: 1px solid #f3f4f6;
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .day-cell:nth-child(7n) { border-right: none; }
    .day-cell.empty { background: #fafafa; }

    /* 오늘 강조 */
    .day-cell.today { background: #eff6ff; }
    .day-cell.today .day-num-wrap { background: #2563eb; border-radius: 50%; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; }
    .day-cell.today .day-num { color: white !important; }

    /* 근무 배지 - 왼쪽 상단 */
    .shift-badge {
      position: absolute;
      top: 3px; left: 3px;
      font-size: 0.6rem;
      font-weight: 700;
      padding: 1px 5px;
      border-radius: 3px;
      color: white;
      line-height: 1.4;
    }
    .badge-day-shift   { background: #d97706; }
    .badge-night-shift { background: #111827; }
    .badge-off-day     { background: #dc2626; }

    /* 날짜 숫자 */
    .day-num-wrap {
      margin-top: 16px;
      display: flex; align-items: center; justify-content: center;
      width: 32px; height: 32px;
    }
    .day-num {
      font-size: 1.1rem;
      font-weight: 700;
      color: #1f2937;
      line-height: 1;
    }

    /* 일/토 색상 */
    .sun .day-num { color: #ef4444; }
    .sat .day-num { color: #3b82f6; }

    /* 반응형 */
    @media (max-width: 480px) {
      .day-cell      { min-height: 54px; }
      .day-num       { font-size: 0.95rem; }
      .shift-badge   { font-size: 0.55rem; padding: 1px 4px; }
      .day-num-wrap  { width: 28px; height: 28px; margin-top: 14px; }
      .nav-label     { font-size: 1.1rem; }
      .calendar-wrap { margin: 8px; }
    }
    @media (max-width: 360px) {
      .day-cell     { min-height: 46px; }
      .day-num      { font-size: 0.82rem; }
      .shift-badge  { display: none; }
    }
  </style>
</head>
<body>

  <!-- 상단 파란 헤더 -->
  <div class="top-bar">
    <div>
      <div class="top-bar-title">교대 달력</div>
      <div class="top-bar-sub" id="team-desc">A조 · 3조 2교대</div>
    </div>
  </div>

  <!-- 조 선택 탭 -->
  <div class="team-tabs" id="team-tabs"></div>

  <!-- 월 네비게이션 -->
  <div class="month-nav">
    <button class="nav-btn" id="btn-prev">&#8592;</button>
    <div class="nav-label" id="nav-label"></div>
    <button class="nav-btn" id="btn-next">&#8594;</button>
  </div>

  <!-- 범례 -->
  <div class="legend">
    <div class="legend-item"><span class="legend-badge badge-day">주</span> 주간</div>
    <div class="legend-item"><span class="legend-badge badge-night">야</span> 야간</div>
    <div class="legend-item"><span class="legend-badge badge-off">휴</span> 휴무</div>
  </div>

  <!-- 달력 -->
  <div id="calendar-area"></div>

  <script>
    var TEAMS = [
      {
        name: 'A조',
        desc: 'A조 · 3조 2교대',
        pattern: ['주','주','주','주','휴','휴','야','야','야','야','휴','휴'],
        start: new Date(2026, 2, 10)
      },
      {
        name: 'B조',
        desc: 'B조 · 3조 2교대',
        pattern: ['주','주','주','주','휴','휴','야','야','야','야','휴','휴'],
        start: new Date(2026, 2, 2)
      },
      {
        name: 'C조',
        desc: 'C조 · 3조 2교대',
        pattern: ['주','주','주','주','휴','휴','야','야','야','야','휴','휴'],
        start: new Date(2026, 1, 22)
      },
    ];

    var RANGE_START = { year: 2026, month: 2 };
    var RANGE_END   = { year: 2027, month: 11 };
    var currentTeamIdx = 0;
    var currentYear    = RANGE_START.year;
    var currentMonth   = RANGE_START.month;

    function getShift(team, date) {
      var diff = Math.floor((date - team.start) / (1000 * 60 * 60 * 24));
      var len  = team.pattern.length;
      return team.pattern[((diff % len) + len) % len];
    }
    function isAtStart() { return currentYear === RANGE_START.year && currentMonth === RANGE_START.month; }
    function isAtEnd()   { return currentYear === RANGE_END.year   && currentMonth === RANGE_END.month; }
    function monthName(m) { return (m + 1) + '월'; }

    function renderTeamTabs() {
      var container = document.getElementById('team-tabs');
      container.innerHTML = '';
      TEAMS.forEach(function(team, idx) {
        var btn = document.createElement('button');
        btn.className = 'team-tab' + (idx === currentTeamIdx ? ' active' : '');
        btn.textContent = team.name;
        btn.onclick = function() { currentTeamIdx = idx; renderAll(); };
        container.appendChild(btn);
      });
    }

    function renderNav() {
      document.getElementById('nav-label').textContent = currentYear + '년 ' + monthName(currentMonth);
      document.getElementById('btn-prev').disabled = isAtStart();
      document.getElementById('btn-next').disabled = isAtEnd();
    }

    function renderCalendar() {
      var area  = document.getElementById('calendar-area');
      var team  = TEAMS[currentTeamIdx];
      var today = new Date(); today.setHours(0,0,0,0);
      var weekdays = ['일','월','화','수','목','금','토'];
      var year = currentYear, m = currentMonth;
      var firstDay = new Date(year, m, 1);
      var lastDay  = new Date(year, m + 1, 0);
      var startDow = firstDay.getDay();

      var dayCount = 0, nightCount = 0, offCount = 0;
      for (var d = 1; d <= lastDay.getDate(); d++) {
        var s = getShift(team, new Date(year, m, d));
        if (s === '주') dayCount++; else if (s === '야') nightCount++; else offCount++;
      }

      var html = '<div class="calendar-wrap">';

      // 통계 바
      html += '<div class="month-stats-bar">';
      html += '<span class="stat stat-day">주간 ' + dayCount + '일</span>';
      html += '<span class="stat stat-night">야간 ' + nightCount + '일</span>';
      html += '<span class="stat stat-off">휴무 ' + offCount + '일</span>';
      html += '</div>';

      // 요일 헤더
      html += '<div class="weekdays">';
      weekdays.forEach(function(wd) { html += '<div class="weekday">' + wd + '</div>'; });
      html += '</div>';

      // 날짜 그리드
      html += '<div class="days-grid">';

      for (var i = 0; i < startDow; i++) {
        html += '<div class="day-cell empty"></div>';
      }

      for (var d = 1; d <= lastDay.getDate(); d++) {
        var date    = new Date(year, m, d);
        var shift   = getShift(team, date);
        var dow     = date.getDay();
        var isToday = date.getTime() === today.getTime();

        var cls = 'day-cell';
        if (dow === 0) cls += ' sun';
        if (dow === 6) cls += ' sat';
        if (isToday)   cls += ' today';

        var badgeCls = shift === '주' ? 'badge-day-shift' : shift === '야' ? 'badge-night-shift' : 'badge-off-day';
        var badgeTxt = shift === '주' ? '주' : shift === '야' ? '야' : '휴';

        html += '<div class="' + cls + '">';
        html += '<span class="shift-badge ' + badgeCls + '">' + badgeTxt + '</span>';
        html += '<div class="day-num-wrap"><span class="day-num">' + d + '</span></div>';
        html += '</div>';
      }

      html += '</div></div>';
      area.innerHTML = html;
    }

    function renderAll() {
      renderTeamTabs();
      renderNav();
      renderCalendar();
      document.getElementById('team-desc').textContent = TEAMS[currentTeamIdx].desc;
    }

    document.getElementById('btn-prev').onclick = function() {
      if (isAtStart()) return;
      currentMonth--;
      if (currentMonth < 0) { currentMonth = 11; currentYear--; }
      renderAll();
    };
    document.getElementById('btn-next').onclick = function() {
      if (isAtEnd()) return;
      currentMonth++;
      if (currentMonth > 11) { currentMonth = 0; currentYear++; }
      renderAll();
    };

    (function() {
      var now = new Date(), ny = now.getFullYear(), nm = now.getMonth();
      var inRange =
        (ny > RANGE_START.year || (ny === RANGE_START.year && nm >= RANGE_START.month)) &&
        (ny < RANGE_END.year   || (ny === RANGE_END.year   && nm <= RANGE_END.month));
      if (inRange) { currentYear = ny; currentMonth = nm; }
      renderAll();
    })();
  </script>

</body>
</html>
