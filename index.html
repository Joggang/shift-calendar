<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="교대달력" />
  <meta name="theme-color" content="#4a90e2" />
  <title>교대 달력 - A조</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #f4f6fb; color: #333; font-family: 'Noto Sans KR', sans-serif; min-height: 100vh; padding: 16px; }
    .header { text-align: center; margin-bottom: 20px; padding: 24px 16px; background: white; border-radius: 16px; box-shadow: 0 2px 12px rgba(0,0,0,0.07); }
    .header h1 { font-size: 1.5rem; font-weight: 700; color: #2c3e50; }
    .header p { color: #888; font-size: 0.82rem; margin-top: 6px; line-height: 1.6; }
    .legend { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
    .legend-item { display: flex; align-items: center; gap: 6px; font-size: 0.8rem; color: #555; background: white; padding: 6px 12px; border-radius: 20px; box-shadow: 0 1px 6px rgba(0,0,0,0.07); }
    .legend-dot { width: 24px; height: 24px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; font-weight: 700; color: white; }
    .dot-day { background: #4a90e2; }
    .dot-night { background: #5c6bc0; }
    .dot-off { background: #b0bec5; }
    .months-container { display: flex; flex-direction: column; gap: 16px; }
    .month-card { background: white; border-radius: 16px; box-shadow: 0 2px 12px rgba(0,0,0,0.07); overflow: hidden; }
    .month-header { padding: 12px 16px; background: #f8f9fc; border-bottom: 1px solid #eef0f5; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; }
    .month-title { font-size: 1rem; font-weight: 700; color: #2c3e50; }
    .month-stats { display: flex; gap: 6px; flex-wrap: wrap; }
    .stat { font-size: 0.72rem; padding: 3px 9px; border-radius: 20px; font-weight: 600; }
    .stat-day   { background: #e3f0fd; color: #4a90e2; }
    .stat-night { background: #ede7f6; color: #5c6bc0; }
    .stat-off   { background: #eceff1; color: #78909c; }
    .calendar-grid { padding: 12px; }
    .weekdays { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; margin-bottom: 3px; }
    .weekday { text-align: center; font-size: 0.7rem; font-weight: 600; padding: 4px; color: #aaa; }
    .weekday:first-child { color: #e57373; }
    .weekday:last-child  { color: #64b5f6; }
    .days-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; }
    .day-cell { border-radius: 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 52px; position: relative; transition: transform 0.12s; cursor: default; }
    .day-cell:hover { transform: scale(1.06); }
    .day-cell.empty { background: transparent; border: none; }
    .day-cell.day-shift   { background: #e8f2fd; border: 1.5px solid #b3d4f5; }
    .day-cell.night-shift { background: #ede7f6; border: 1.5px solid #c5b3e6; }
    .day-cell.off-day     { background: #f5f5f5; border: 1.5px solid #e0e0e0; }
    .day-cell.today { box-shadow: 0 0 0 2.5px #ff7043 !important; }
    .day-num { font-size: 0.95rem; font-weight: 700; line-height: 1; }
    .day-cell.day-shift   .day-num { color: #1a6abf; }
    .day-cell.night-shift .day-num { color: #4527a0; }
    .day-cell.off-day     .day-num { color: #90a4ae; }
    .shift-label { font-size: 0.58rem; font-weight: 600; margin-top: 3px; }
    .day-cell.day-shift   .shift-label { color: #4a90e2; }
    .day-cell.night-shift .shift-label { color: #7c57c8; }
    .day-cell.off-day     .shift-label { color: #b0bec5; }
    .sun .day-num { color: #e57373 !important; }
    .sat .day-num { color: #64b5f6 !important; }
    .today-badge { position: absolute; top: 4px; right: 4px; width: 5px; height: 5px; background: #ff7043; border-radius: 50%; }
    @media (max-width: 480px) {
      body { padding: 10px; }
      .header h1 { font-size: 1.2rem; }
      .header p { font-size: 0.75rem; }
      .month-title { font-size: 0.9rem; }
      .stat { font-size: 0.65rem; padding: 2px 7px; }
      .calendar-grid { padding: 8px; }
      .days-grid { gap: 2px; }
      .weekdays { gap: 2px; }
      .day-cell { min-height: 44px; border-radius: 8px; }
      .day-num { font-size: 0.82rem; }
      .shift-label { font-size: 0.52rem; }
      .weekday { font-size: 0.62rem; }
    }
    @media (max-width: 360px) {
      .day-cell { min-height: 38px; }
      .day-num { font-size: 0.75rem; }
      .shift-label { display: none; }
    }
  </style>
</head>
<body>

  <div class="header">
    <h1>🗓️ 교대 달력</h1>
    <p>A조 · 3조 2교대 · 주간 4일 → 휴무 2일 → 야간 4일 → 휴무 2일</p>
  </div>

  <div class="legend">
    <div class="legend-item"><div class="legend-dot dot-day">주</div> 주간 근무</div>
    <div class="legend-item"><div class="legend-dot dot-night">야</div> 야간 근무</div>
    <div class="legend-item"><div class="legend-dot dot-off">휴</div> 휴무</div>
  </div>

  <div class="months-container" id="months"></div>

  <script>
    var PATTERN = ['주','주','주','주','휴','휴','야','야','야','야','휴','휴'];
    var START = new Date(2026, 2, 10);

    function getShift(date) {
      var diff = Math.floor((date - START) / (1000 * 60 * 60 * 24));
      return PATTERN[((diff % 12) + 12) % 12];
    }

    function renderMonths() {
      var container = document.getElementById('months');
      var today = new Date();
      today.setHours(0, 0, 0, 0);
      var monthNames = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
      var weekdays = ['일','월','화','수','목','금','토'];

      for (var m = 2; m <= 7; m++) {
        var year = 2026;
        var firstDay = new Date(year, m, 1);
        var lastDay = new Date(year, m + 1, 0);
        var startDow = firstDay.getDay();

        var dayCount = 0, nightCount = 0, offCount = 0;
        for (var d = 1; d <= lastDay.getDate(); d++) {
          var s = getShift(new Date(year, m, d));
          if (s === '주') dayCount++;
          else if (s === '야') nightCount++;
          else offCount++;
        }

        var card = document.createElement('div');
        card.className = 'month-card';

        var header = document.createElement('div');
        header.className = 'month-header';
        header.innerHTML =
          '<div class="month-title">' + year + '년 ' + monthNames[m] + '</div>' +
          '<div class="month-stats">' +
            '<span class="stat stat-day">주간 ' + dayCount + '일</span>' +
            '<span class="stat stat-night">야간 ' + nightCount + '일</span>' +
            '<span class="stat stat-off">휴무 ' + offCount + '일</span>' +
          '</div>';
        card.appendChild(header);

        var calGrid = document.createElement('div');
        calGrid.className = 'calendar-grid';

        var wdRow = document.createElement('div');
        wdRow.className = 'weekdays';
        for (var w = 0; w < weekdays.length; w++) {
          var wd = document.createElement('div');
          wd.className = 'weekday';
          wd.textContent = weekdays[w];
          wdRow.appendChild(wd);
        }
        calGrid.appendChild(wdRow);

        var daysGrid = document.createElement('div');
        daysGrid.className = 'days-grid';

        for (var i = 0; i < startDow; i++) {
          var empty = document.createElement('div');
          empty.className = 'day-cell empty';
          daysGrid.appendChild(empty);
        }

        for (var d = 1; d <= lastDay.getDate(); d++) {
          var date = new Date(year, m, d);
          var shift = getShift(date);
          var dow = date.getDay();
          var isToday = date.getTime() === today.getTime();

          var cell = document.createElement('div');
          var cls = 'day-cell';
          if (shift === '주') cls += ' day-shift';
          else if (shift === '야') cls += ' night-shift';
          else cls += ' off-day';
          if (dow === 0) cls += ' sun';
          if (dow === 6) cls += ' sat';
          if (isToday) cls += ' today';
          cell.className = cls;

          var numSpan = document.createElement('span');
          numSpan.className = 'day-num';
          numSpan.textContent = d;
          cell.appendChild(numSpan);

          var labelSpan = document.createElement('span');
          labelSpan.className = 'shift-label';
          labelSpan.textContent = shift === '주' ? '주간' : shift === '야' ? '야간' : '휴무';
          cell.appendChild(labelSpan);

          if (isToday) {
            var badge = document.createElement('div');
            badge.className = 'today-badge';
            cell.appendChild(badge);
          }

          daysGrid.appendChild(cell);
        }

        calGrid.appendChild(daysGrid);
        card.appendChild(calGrid);
        container.appendChild(card);
      }
    }

    renderMonths();

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function() {
        navigator.serviceWorker.register('/shift-calendar/service-worker.js');
      });
    }
  </script>

</body>
</html>
