<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>교대 달력 - A조</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #f4f6fb; color: #333; font-family: 'Noto Sans KR', sans-serif; min-height: 100vh; padding: 20px; }
  .header { text-align: center; margin-bottom: 28px; padding: 28px 20px; background: white; border-radius: 16px; box-shadow: 0 2px 12px rgba(0,0,0,0.07); }
  .header h1 { font-size: 1.7rem; font-weight: 700; color: #2c3e50; letter-spacing: 1px; }
  .header p { color: #888; font-size: 0.85rem; margin-top: 6px; }
  .legend { display: flex; justify-content: center; gap: 16px; margin-bottom: 22px; flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 7px; font-size: 0.83rem; color: #555; background: white; padding: 7px 14px; border-radius: 20px; box-shadow: 0 1px 6px rgba(0,0,0,0.07); }
  .legend-dot { width: 26px; height: 26px; border-radius: 7px; display: flex; align-items: center; justify-content: center; font-size: 0.72rem; font-weight: 700; color: white; }
  .dot-day { background: #4a90e2; } .dot-night { background: #5c6bc0; } .dot-off { background: #b0bec5; }
  .months-container { display: flex; flex-direction: column; gap: 20px; }
  .month-card { background: white; border-radius: 16px; box-shadow: 0 2px 12px rgba(0,0,0,0.07); overflow: hidden; }
  .month-header { padding: 14px 20px; background: #f8f9fc; border-bottom: 1px solid #eef0f5; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; }
  .month-title { font-size: 1.1rem; font-weight: 700; color: #2c3e50; }
  .month-stats { display: flex; gap: 8px; flex-wrap: wrap; }
  .stat { font-size: 0.75rem; padding: 3px 10px; border-radius: 20px; font-weight: 600; }
  .stat-day { background: #e3f0fd; color: #4a90e2; } .stat-night { background: #ede7f6; color: #5c6bc0; } .stat-off { background: #eceff1; color: #78909c; }
  .calendar-grid { padding: 14px; }
  .weekdays { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; margin-bottom: 4px; }
  .weekday { text-align: center; font-size: 0.72rem; font-weight: 600; padding: 5px; color: #aaa; }
  .weekday:first-child { color: #e57373; } .weekday:last-child { color: #64b5f6; }
  .days-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
  .day-cell { border-radius: 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 54px; position: relative; transition: transform 0.12s; }
  .day-cell:hover { transform: scale(1.05); }
  .day-cell.day-shift { background: #e8f2fd; border: 1.5px solid #b3d4f5; }
  .day-cell.night-shift { background: #ede7f6; border: 1.5px solid #c5b3e6; }
  .day-cell.off-day { background: #f5f5f5; border: 1.5px solid #e0e0e0; }
  .day-cell.today { box-shadow: 0 0 0 2.5px #ff7043 !important; }
  .day-num { font-size: 1rem; font-weight: 700; line-height: 1; }
  .day-cell.day-shift .day-num { color: #1a6abf; } .day-cell.night-shift .day-num { color: #4527a0; } .day-cell.off-day .day-num { color: #90a4ae; }
  .shift-label { font-size: 0.6rem; font-weight: 600; margin-top: 3px; }
  .day-cell.day-shift .shift-label { color: #4a90e2; } .day-cell.night-shift .shift-label { color: #7c57c8; } .day-cell.off-day .shift-label { color: #b0bec5; }
  .sun .day-num { color: #e57373 !important; } .sat .day-num { color: #64b5f6 !important; }
  .today-badge { position: absolute; top: 4px; right: 4px; width: 6px; height: 6px; background: #ff7043; border-radius: 50%; }
</style>
</head>
<body>
<div class="header">
  <h1>🗓️ 교대 달력</h1>
  <p>A조 · 3조 2교대 · 주간 4일 → 휴무 2일 → 야간 4일 → 휴무 2일</p>
</div>
<div class="legend">
  <div class="legend-item"><div class="legend-dot dot-day">주</div> 주간 근무</div>
  <div class="legend-item"><div class="legend-dot dot-night">야</div> 야간 근무</div>
  <div class="legend-item"><div class="legend-dot dot-off">휴</div> 휴무</div>
</div>
<div class="months-container" id="months"></div>
<script>
  const PATTERN = ['주','주','주','주','휴','휴','야','야','야','야','휴','휴'];
  const START = new Date(2026, 2, 10);
  function getShift(date) {
    const diff = Math.floor((date - START) / (1000*60*60*24));
    return PATTERN[((diff % 12) + 12) % 12];
  }
  function renderMonths() {
    const container = document.getElementById('months');
    const today = new Date(); today.setHours(0,0,0,0);
    const monthNames = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
    const weekdays = ['일','월','화','수','목','금','토'];
    for (let m = 2; m <= 7; m++) {
      const year = 2026;
      const firstDay = new Date(year, m, 1);
      const lastDay = new Date(year, m+1, 0);
      const startDow = firstDay.getDay();
      let counts = {'주':0,'야':0,'휴':0};
      for (let d = 1; d <= lastDay.getDate(); d++) counts[getShift(new Date(year,m,d))]++;
      const card = document.createElement('div');
      card.className = 'month-card';
      card.innerHTML = `
        <div class="month-header">
          <div class="month-title">${year}년 ${monthNames[m]}</div>
          <div class="month-stats">
            <span class="stat stat-day">주간 ${counts['주']}일</span>
            <span class="stat stat-night">야간 ${counts['야']}일</span>
            <span class="stat stat-off">휴무 ${counts['휴']}일</span>
          </div>
        </div>
        <div class="calendar-grid">
          <div class="weekdays">${weekdays.map(w=>`<div class="weekday">${w}</div>`).join('')}</div>
          <div class="days-grid" id="grid-${m}"></div>
        </div>`;
      container.appendChild(card);
      const grid = card.querySelector(`#grid-${m}`);
      for (let i = 0; i < startDow; i++) { const e = document.createElement('div'); e.className='day-cell empty'; grid.appendChild(e); }
      for (let d = 1; d <= lastDay.getDate(); d++) {
        const date = new Date(year,m,d);
        const shift = getShift(date);
        const dow = date.getDay();
        const isToday = date.getTime() === today.getTime();
        const cell = document.createElement('div');
        let cls = 'day-cell';
        if (shift==='주') cls += ' day-shift';
        else if (shift==='야') cls += ' night-shift';
        else cls += ' off-day';
        if (dow===0) cls += ' sun';
        if (dow===6) cls += ' sat';
        if (isToday) cls += ' today';
        cell.className = cls;
        cell.innerHTML = `<span class="day-num">${d}</span><span class="shift-label">${shift==='주'?'주간':shift==='야'?'야간':'휴무'}</span>${isToday?'<div class="today-badge"></div>':''}`;
        grid.appendChild(cell);
      }
    }
  }
  renderMonths();
</script>
</body>
</html>
