<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>교대 달력 - A조</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
  :root {
    --day: #1a6fff;
    --night: #0d1f4e;
    --off: #2d2d2d;
    --bg: #0a0a0f;
    --card: #13131a;
    --border: #1e1e2e;
    --text: #e8e8f0;
    --muted: #555570;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100vh;
    padding: 20px;
  }

  .header {
    text-align: center;
    margin-bottom: 30px;
    padding: 30px 20px;
    background: linear-gradient(135deg, #0d1f4e 0%, #1a1a2e 50%, #0a0a0f 100%);
    border-radius: 20px;
    border: 1px solid #1a6fff33;
    position: relative;
    overflow: hidden;
  }

  .header::before {
    content: '';
    position: absolute;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: radial-gradient(circle at 30% 50%, #1a6fff15 0%, transparent 50%),
                radial-gradient(circle at 70% 50%, #0d1f4e30 0%, transparent 50%);
    pointer-events: none;
  }

  .header h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 3rem;
    letter-spacing: 4px;
    color: #1a6fff;
    text-shadow: 0 0 30px #1a6fff66;
  }

  .header p {
    color: var(--muted);
    font-size: 0.9rem;
    margin-top: 8px;
    letter-spacing: 2px;
  }

  .legend {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-bottom: 25px;
    flex-wrap: wrap;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 0.85rem;
    color: var(--muted);
  }

  .legend-dot {
    width: 28px;
    height: 28px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.75rem;
    font-weight: 700;
  }

  .dot-day { background: var(--day); color: white; }
  .dot-night { background: var(--night); border: 1px solid #1a6fff44; color: #7ba8ff; }
  .dot-off { background: var(--off); color: #888; }

  .months-container {
    display: flex;
    flex-direction: column;
    gap: 25px;
  }

  .month-card {
    background: var(--card);
    border-radius: 16px;
    border: 1px solid var(--border);
    overflow: hidden;
    animation: fadeIn 0.4s ease forwards;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .month-header {
    padding: 16px 20px;
    background: linear-gradient(90deg, #0d1f4e, #13131a);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .month-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.6rem;
    letter-spacing: 3px;
    color: #1a6fff;
  }

  .month-stats {
    display: flex;
    gap: 12px;
  }

  .stat {
    font-size: 0.75rem;
    padding: 4px 10px;
    border-radius: 20px;
    font-weight: 500;
  }

  .stat-day { background: #1a6fff22; color: #6699ff; border: 1px solid #1a6fff44; }
  .stat-night { background: #0d1f4e55; color: #4466cc; border: 1px solid #0d3d9966; }
  .stat-off { background: #2d2d2d44; color: #777; border: 1px solid #33333366; }

  .calendar-grid {
    padding: 15px;
  }

  .weekdays {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
    margin-bottom: 4px;
  }

  .weekday {
    text-align: center;
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 1px;
    padding: 6px;
    color: var(--muted);
  }

  .weekday:first-child { color: #ff5555; }
  .weekday:last-child { color: #5599ff; }

  .days-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
  }

  .day-cell {
    aspect-ratio: 1;
    border-radius: 10px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    min-height: 52px;
    transition: transform 0.15s ease;
    cursor: default;
  }

  .day-cell:hover { transform: scale(1.05); }

  .day-cell.empty { background: transparent; }

  .day-cell.day-shift {
    background: linear-gradient(135deg, #1a4aaa, #1a6fff);
    box-shadow: 0 4px 12px #1a6fff33;
  }

  .day-cell.night-shift {
    background: linear-gradient(135deg, #060d1f, #0d1f4e);
    border: 1px solid #1a3a7a44;
    box-shadow: 0 4px 12px #00000066;
  }

  .day-cell.off-day {
    background: #1a1a22;
    border: 1px solid #2a2a3a;
  }

  .day-cell.today {
    ring: 2px solid #ffcc00;
    box-shadow: 0 0 0 2px #ffcc00, 0 4px 16px #ffcc0033 !important;
  }

  .day-num {
    font-size: 1rem;
    font-weight: 700;
    line-height: 1;
  }

  .day-cell.day-shift .day-num { color: white; }
  .day-cell.night-shift .day-num { color: #7baeff; }
  .day-cell.off-day .day-num { color: #555; }

  .shift-label {
    font-size: 0.6rem;
    font-weight: 700;
    letter-spacing: 0.5px;
    margin-top: 3px;
  }

  .day-cell.day-shift .shift-label { color: #ffffffcc; }
  .day-cell.night-shift .shift-label { color: #4466aa; }
  .day-cell.off-day .shift-label { color: #444; }

  .sun .day-num { color: #ff6666 !important; }
  .sat .day-num { color: #6699ff !important; }

  .today-badge {
    position: absolute;
    top: 3px;
    right: 3px;
    width: 6px;
    height: 6px;
    background: #ffcc00;
    border-radius: 50%;
    box-shadow: 0 0 6px #ffcc00;
  }

  @media (max-width: 480px) {
    .day-cell { min-height: 44px; border-radius: 8px; }
    .day-num { font-size: 0.85rem; }
    .shift-label { font-size: 0.55rem; }
    .month-title { font-size: 1.3rem; }
    .header h1 { font-size: 2rem; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>🏭 교대 달력</h1>
  <p>A조 · 3조 2교대 · 주간4일 → 휴무2일 → 야간4일 → 휴무2일</p>
</div>

<div class="legend">
  <div class="legend-item">
    <div class="legend-dot dot-day">주</div>
    <span>주간 근무</span>
  </div>
  <div class="legend-item">
    <div class="legend-dot dot-night">야</div>
    <span>야간 근무</span>
  </div>
  <div class="legend-item">
    <div class="legend-dot dot-off">휴</div>
    <span>휴무</span>
  </div>
</div>

<div class="months-container" id="months"></div>

<script>
  // A조 기준: 2026년 3월 10일부터 주간 시작
  // 패턴: 주간4 휴무2 야간4 휴무2 = 12일 주기
  const PATTERN = ['주','주','주','주','휴','휴','야','야','야','야','휴','휴'];
  const START = new Date(2026, 2, 10); // 3월 10일

  function getShift(date) {
    const diff = Math.floor((date - START) / (1000*60*60*24));
    if (diff < 0) {
      // 시작 전도 패턴 역산
      const idx = ((diff % 12) + 12) % 12;
      return PATTERN[idx];
    }
    return PATTERN[diff % 12];
  }

  function renderMonths() {
    const container = document.getElementById('months');
    const today = new Date();
    today.setHours(0,0,0,0);

    const monthNames = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
    const weekdays = ['일','월','화','수','목','금','토'];

    // 3월~8월 (6개월)
    for (let m = 2; m <= 7; m++) {
      const year = 2026;
      const firstDay = new Date(year, m, 1);
      const lastDay = new Date(year, m+1, 0);
      const startDow = firstDay.getDay();

      let dayCounts = { '주': 0, '야': 0, '휴': 0 };
      for (let d = 1; d <= lastDay.getDate(); d++) {
        const s = getShift(new Date(year, m, d));
        dayCounts[s]++;
      }

      const card = document.createElement('div');
      card.className = 'month-card';

      card.innerHTML = `
        <div class="month-header">
          <div class="month-title">${year}년 ${monthNames[m]}</div>
          <div class="month-stats">
            <span class="stat stat-day">주간 ${dayCounts['주']}일</span>
            <span class="stat stat-night">야간 ${dayCounts['야']}일</span>
            <span class="stat stat-off">휴무 ${dayCounts['휴']}일</span>
          </div>
        </div>
        <div class="calendar-grid">
          <div class="weekdays">
            ${weekdays.map(w => `<div class="weekday">${w}</div>`).join('')}
          </div>
          <div class="days-grid" id="grid-${m}"></div>
        </div>
      `;

      container.appendChild(card);

      const grid = card.querySelector(`#grid-${m}`);

      // 빈 칸
      for (let i = 0; i < startDow; i++) {
        const empty = document.createElement('div');
        empty.className = 'day-cell empty';
        grid.appendChild(empty);
      }

      // 날짜 채우기
      for (let d = 1; d <= lastDay.getDate(); d++) {
        const date = new Date(year, m, d);
        const shift = getShift(date);
        const dow = date.getDay();
        const isToday = date.getTime() === today.getTime();

        const cell = document.createElement('div');
        let cls = 'day-cell';
        if (shift === '주') cls += ' day-shift';
        else if (shift === '야') cls += ' night-shift';
        else cls += ' off-day';
        if (dow === 0) cls += ' sun';
        if (dow === 6) cls += ' sat';
        if (isToday) cls += ' today';
        cell.className = cls;

        cell.innerHTML = `
          <span class="day-num">${d}</span>
          <span class="shift-label">${shift === '주' ? '주간' : shift === '야' ? '야간' : '휴무'}</span>
          ${isToday ? '<div class="today-badge"></div>' : ''}
        `;

        grid.appendChild(cell);
      }
    }
  }

  renderMonths();
</script>
</body>
</html>
